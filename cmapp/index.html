
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Manage confessions and spiritual guidance sessions">
    <meta name="theme-color" content="#4f46e6">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Confession Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --surface-hover: #f1f5f9;
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e6;
            --primary-muted: #e0e7ff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-muted: #fee2e2;
        }

        .theme-dark {
            --bg: #020617;
            --surface: #0f172a;
            --surface-hover: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-muted: #1e1b4b;
            --border: #1e293b;
            --danger: #f87171;
            --danger-muted: #450a0a;
        }

        .theme-sepia {
            --bg: #f4ecd8;
            --surface: #fdf6e3;
            --surface-hover: #f9f0d3;
            --text: #433422;
            --text-muted: #8b7355;
            --primary: #8b5e3c;
            --primary-muted: #eadbc0;
            --border: #e5d8b8;
            --danger: #b91c1c;
            --danger-muted: #f5e1da;
        }

        /* RESET & NATIVE FEEL */
        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* GLOBALLY HIDE SCROLLBARS BUT ALLOW SCROLLING */
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.1s ease;
        }

        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        /* Utility classes using variables */
        .app-bg { background-color: var(--bg); }
        .app-surface { background-color: var(--surface); }
        .app-text { color: var(--text); }
        .app-text-muted { color: var(--text-muted); }
        .app-border { border-color: var(--border); }
        .app-primary { color: var(--primary); }
        .app-bg-primary { background-color: var(--primary); }
        .app-bg-primary-muted { background-color: var(--primary-muted); }

        /* SafeArea support */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Prevent overscroll bounce on the main body to keep it feeling like an app */
        body {
            overscroll-behavior-y: none;
        }

        #root {
            height: 100%;
        }
    </style>

}
