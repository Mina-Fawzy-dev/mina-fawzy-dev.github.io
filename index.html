<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CG Hub — Mina's Resource Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&family=Barlow:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg: #0a0a0c;
      --bg2: #111116;
      --bg3: #18181f;
      --border: #2a2a35;
      --accent: #c8f542;
      --accent2: #42f5c8;
      --accent3: #f5a742;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --card: #13131a;
      --hover: #1e1e28;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.6;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      fill: #0a0a0c;
    }

    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
    }

    .logo-text span {
      color: var(--accent);
    }

    /* SEARCH */
    .search-wrap {
      flex: 1;
      max-width: 440px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px 9px 40px;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .site-count {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .site-count span {
      color: var(--accent);
    }

    /* LAYOUT */
    .layout {
      display: flex;
      min-height: calc(100vh - 65px);
    }

    /* SIDEBAR */
    aside {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar-section {
      margin-bottom: 6px;
    }

    .sidebar-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px 20px 6px;
      display: block;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 20px;
      width: 100%;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      letter-spacing: 0.01em;
    }

    .nav-btn i {
      font-size: 14px;
      width: 16px;
    }

    .nav-btn:hover {
      color: var(--text);
      background: var(--bg3);
      border-left-color: var(--border);
    }

    .nav-btn.active {
      color: var(--accent);
      background: rgba(200, 245, 66, 0.06);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    .nav-count {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .nav-btn.active .nav-count {
      color: var(--accent);
      background: rgba(200, 245, 66, 0.1);
    }

    /* MAIN */
    main {
      flex: 1;
      padding: 28px 32px;
      overflow-x: hidden;
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 22px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 32px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }

    .section-title .accent {
      color: var(--accent);
    }

    .section-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* GRID */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    /* SITE CARD */
    .site-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.18s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .site-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .site-card:hover {
      border-color: var(--accent);
      background: var(--hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(200, 245, 66, 0.08);
    }

    .site-card:hover::before {
      opacity: 0.04;
    }

    .site-favicon {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      background: var(--bg3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .site-favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-favicon .fallback {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .site-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .site-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .site-domain {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Space Mono', monospace;
    }

    .site-card:hover .site-domain {
      color: var(--accent);
    }

    .site-arrow {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.15s;
      position: relative;
      z-index: 1;
    }

    .site-card:hover .site-arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--accent);
    }

    /* CATEGORY PILLS */
    .sub-cats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .sub-cat-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .sub-cat-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .sub-cat-btn.active {
      background: var(--accent);
      color: #0a0a0c;
      border-color: var(--accent);
    }

    /* HOME DASHBOARD */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .dash-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .dash-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-color, var(--accent));
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .dash-card:hover {
      border-color: var(--accent-color, var(--accent));
      background: var(--hover);
      transform: translateY(-2px);
    }

    .dash-card:hover::after {
      transform: scaleX(1);
    }

    .dash-icon {
      font-size: 28px;
      margin-bottom: 10px;
      color: var(--accent-color, var(--accent));
    }

    .dash-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 4px;
    }

    .dash-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* HERO */
    .hero {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(200, 245, 66, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 52px;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 12px;
    }

    .hero-title .line2 {
      color: var(--accent);
    }

    .hero-desc {
      font-size: 14px;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      font-weight: 300;
    }

    /* SEARCH RESULTS EMPTY */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state i {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* QUICK TOOLS BAR */
    .quick-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .quick-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .quick-pill:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .quick-pill i {
      font-size: 13px;
    }

    .quick-group {
      margin-bottom: 18px;
    }

    .quick-group-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .quick-group-label i {
      font-size: 13px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* SEARCH HIGHLIGHT */
    .site-card.hidden {
      display: none;
    }

    mark {
      background: rgba(200, 245, 66, 0.25);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* FOOTER LINE */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      margin-top: 32px;
    }

    .section-divider span {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 12, 0.8);
      backdrop-filter: blur(4px);
      z-index: 99;
    }

    .global-footer {
      margin-top: 40px;
    }

    .global-about {
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .about-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .about-title span {
      color: var(--accent);
    }

    .about-desc {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 14px;
      max-width: 500px;
    }

    .about-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      background: var(--hover);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      transition: all 0.2s;
    }

    .about-btn:hover {
      border-color: var(--accent);
      background: var(--bg3);
    }

    main {
      flex: 1;
      padding: 28px 32px;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    #mainContent {
      flex: 1;
    }

    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: block;
      }

      .logo {
        gap: 8px;
      }

      .logo-text {
        font-size: 18px;
      }

      aside {
        position: fixed;
        left: -260px;
        top: 65px;
        width: 260px;
        height: calc(100vh - 65px);
        background: var(--bg);
        z-index: 100;
        transition: left 0.3s ease;
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
      }

      aside.open {
        left: 0;
      }

      .sidebar-overlay.show {
        display: block;
      }

      .layout {
        flex-direction: column;
      }

      main {
        padding: 20px 16px;
      }

      header {
        padding: 14px 16px;
        gap: 12px;
      }

      .hero-title {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <header>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <a href="#" class="logo" onclick="showSection('home')">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20">
          <path d="M10 2L3 6v8l7 4 7-4V6L10 2zm0 2.4l5 2.85v5.5L10 15.6 5 12.75V7.25L10 4.4z" />
        </svg>
      </div>
      <span class="logo-text">CG<span>Hub</span></span>
    </a>

    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="globalSearch" placeholder="Search fonts, brushes, plugins..."
        oninput="handleSearch(this.value)">
    </div>

    <div class="header-right">
      <div class="site-count">
        <span id="totalCount">0</span> sites
      </div>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="layout">
    <aside id="sidebar">
      <div class="sidebar-section">
        <span class="sidebar-label">Navigation</span>
        <button class="nav-btn active" onclick="showSection('home')" data-section="home">
          <i class="bi bi-house"></i> Home
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">Design Resources</span>
        <button class="nav-btn" onclick="showSection('fonts')" data-section="fonts">
          <i class="bi bi-file-earmark-font"></i> Fonts <span class="nav-count" id="nc-fonts"></span>
        </button>
        <button class="nav-btn" onclick="showSection('brushes')" data-section="brushes">
          <i class="bi bi-brush"></i> Brushes <span class="nav-count" id="nc-brushes"></span>
        </button>
        <button class="nav-btn" onclick="showSection('textures')" data-section="textures">
          <i class="bi bi-grid-3x3-gap"></i> Textures <span class="nav-count" id="nc-textures"></span>
        </button>
        <button class="nav-btn" onclick="showSection('photos')" data-section="photos">
          <i class="bi bi-camera"></i> Photos <span class="nav-count" id="nc-photos"></span>
        </button>
        <button class="nav-btn" onclick="showSection('png-images')" data-section="png-images">
          <i class="bi bi-file-image"></i> PNG Images <span class="nav-count" id="nc-png-images"></span>
        </button>
        <button class="nav-btn" onclick="showSection('icons')" data-section="icons">
          <i class="bi bi-grid"></i> Icons <span class="nav-count" id="nc-icons"></span>
        </button>
        <button class="nav-btn" onclick="showSection('mockups')" data-section="mockups">
          <i class="bi bi-phone"></i> Mockups <span class="nav-count" id="nc-mockups"></span>
        </button>
        <button class="nav-btn" onclick="showSection('videos')" data-section="videos">
          <i class="bi bi-film"></i> Videos <span class="nav-count" id="nc-videos"></span>
        </button>
        <button class="nav-btn" onclick="showSection('illustrations')" data-section="illustrations">
          <i class="bi bi-pencil"></i> Illustrations <span class="nav-count" id="nc-illustrations"></span>
        </button>
        <button class="nav-btn" onclick="showSection('vectors')" data-section="vectors">
          <i class="bi bi-vector-pen"></i> Vectors <span class="nav-count" id="nc-vectors"></span>
        </button>
        <button class="nav-btn" onclick="showSection('colors')" data-section="colors">
          <i class="bi bi-palette"></i> Colors <span class="nav-count" id="nc-colors"></span>
        </button>
        <button class="nav-btn" onclick="showSection('inspiration')" data-section="inspiration">
          <i class="bi bi-lightbulb"></i> Inspiration <span class="nav-count" id="nc-inspiration"></span>
        </button>
        <button class="nav-btn" onclick="showSection('ai-tools')" data-section="ai-tools">
          <i class="bi bi-cpu"></i> AI Tools <span class="nav-count" id="nc-ai-tools"></span>
        </button>
        <button class="nav-btn" onclick="showSection('tools')" data-section="tools">
          <i class="bi bi-wrench"></i> Tools <span class="nav-count" id="nc-tools"></span>
        </button>
        <button class="nav-btn" onclick="showSection('productivity')" data-section="productivity">
          <i class="bi bi-kanban"></i> Productivity <span class="nav-count" id="nc-productivity"></span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">3D Resources</span>
        <button class="nav-btn" onclick="showSection('3d')" data-section="3d">
          <i class="bi bi-cube"></i> 3D Hub <span class="nav-count" id="nc-3d"></span>
        </button>

    function parseSite(str) {
      const [name, url] = str.split('|');
      return { name, url };
    }

    function getDomain(url) {
      try {
        return new URL(url).hostname.replace('www.', '');
      } catch { return url; }
    }

    function getFaviconUrl(url) {
      try {
        const domain = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
      } catch { return null; }
    }

    let total = 0;

    });

    function setNavCounts() {

      if (el3d) {
        let c = 0;
        Object.values(resources['3d']).forEach(v => c += v.sites.length);
        el3d.textContent = c;
      }
    }

    setNavCounts();

    // ===== RENDER =====
    function renderSiteCard(site) {
      const { name, url } = parseSite(site);
      const domain = getDomain(url);
      const favicon = getFaviconUrl(url);
      return `<a class="site-card" href="${url}" target="_blank" rel="noopener" data-name="${name.toLowerCase()}" data-domain="${domain.toLowerCase()}">
    <div class="site-favicon">
      ${favicon ? `<img src="${favicon}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fallback" style="display:none">${name[0]}</span>` : `<span class="fallback">${name[0]}</span>`}
    </div>
    <div class="site-info">
      <div class="site-name">${name}</div>
      <div class="site-domain">${domain}</div>
    </div>
    <i class="bi bi-arrow-up-right site-arrow"></i>
  </a>`;
    }

    function renderSection(data, showTitle = false) {
      return `
    ${showTitle ? `<div class="section-divider"><span>${data.name}</span></div>` : ''}
    <div class="sites-grid" id="grid-${data.id}">
      ${data.sites.map(renderSiteCard).join('')}
    </div>`;
    }

    // ===== SEARCH =====
    function handleSearch(query) {
      const q = query.toLowerCase().trim();

      if (!q) {
        // show current section normally
        document.querySelectorAll('.site-card').forEach(c => c.classList.remove('hidden'));
        return;
      }

      // Show all sections during search
      const main = document.getElementById('mainContent');

      // Collect all sites
      let results = [];
      Object.values(allSections).forEach(s => {
        if (!s.sites) return;
        s.sites.forEach(site => {
          const { name, url } = parseSite(site);
          if (name.toLowerCase().includes(q) || getDomain(url).includes(q) || s.name.toLowerCase().includes(q)) {
            results.push({ site, section: s });
          }
        });
      });

      // Deduplicate
      const seen = new Set();
      results = results.filter(r => {
        if (seen.has(r.site)) return false;
        seen.add(r.site);
        return true;
      });

      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

      if (results.length === 0) {
        main.innerHTML = `<div class="empty-state"><i class="bi bi-search"></i><p>No results for "${query}"</p></div>`;
        return;
      }

      main.innerHTML = `
    <div class="section-header">
      <h1 class="section-title">Search <span class="accent">Results</span></h1>
    </div>
    <div class="section-meta">${results.length} sites found for "${query}"</div>
    <div class="sites-grid">
      ${results.map(r => renderSiteCard(r.site)).join('')}
    </div>
  `;
    }
